global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
alerting:
  alertmanagers:
  - static_configs:
    - targets: []
    scheme: http
    timeout: 10s
    api_version: v2
scrape_configs:
- job_name: prometheus
  honor_timestamps: true
  scrape_interval: 15s
  scrape_timeout: 10s
  metrics_path: /metrics
  scheme: http
  static_configs:
  - targets:
    - localhost:9090
- job_name: cadvisor
  scrape_interval: 5s
  static_configs:
  - targets:
    - cadvisor:8080
- job_name: node_exporter
  scrape_interval: 5s
  static_configs:
  - targets: ['NODE_IP_1:9100']
    labels:
      instance: 'utils-vm'
  - targets: ['NODE_IP_2:9100']
    labels:
      instance: 'lab'
  - targets: ['DOCKER_HOST_IP:9100']
    labels:
      instance: 'docker-vm'
